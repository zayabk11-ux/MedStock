<title>MedStock Pro</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg:         #0f0f0f;
    --surface:    #181818;
    --primary:    #c8f05a; 
    --accent-red: #f05a5a;
    --accent-warn:#f0b45a;
    --text:       #e8e8e8;
    --muted:      #666666;
    --border:      #2a2a2a;
    --font-serif: "Georgia", serif;
    --font-mono:  'DM Mono', monospace;
  }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 80px;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 480px; margin: 0 auto; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .wordmark { font-family: var(--font-serif); font-size: 28px; color: var(--primary); font-weight: 300; }
  .sub-head { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px;}

  .btn-add {
    background: var(--primary); color: #0f0f0f;
    border: none; border-radius: 8px; padding: 10px 16px;
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    cursor: pointer; text-transform: uppercase; transition: transform 0.1s;
  }
  .btn-add:active { transform: scale(0.95); }

  /* Summary Strip */
  .strip { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
  .strip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .strip-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .strip-val { font-size: 24px; color: var(--primary); font-weight: 500; }
  .strip-val.alert { color: var(--accent-red); }
  .strip-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }

  .sec-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin: 24px 0 12px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 8px; }
  .sec-label.inj { color: var(--primary); border-bottom-color: var(--primary); }

  /* Medicine Card */
  .med-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px;
    margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .med-card.low { border: 1px solid var(--accent-red); }
  
  .med-info { flex: 1; }
  .med-name {

    font-size: 18px;
